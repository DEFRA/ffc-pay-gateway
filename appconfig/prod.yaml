---
environment: production
environmentCode: prd
container:
  sftpManagedGatewayEnabled: true
  sftpTraderEnabled: true
  azureStorageAccountName: prdffcpayst1001
  sfiEnabled: true
  sfiPilotEnabled: true
  lumpSumsEnabled: true
  csEnabled: true
  bpsEnabled: true
  esEnabled: true
  fcEnabled: true
  impsEnabled: true
  sfi23Enabled: true
  dpsEnabled: true
  delinkedEnabled: true
  combinedOfferEnabled: true
  cohtCapitalEnabled: false
  sftpManagedGatewayHost: placeholder-tbc
  sftpManagedGatewayPort: 22
  sftpManagedGatewayUsername: placeholder-tbc
  sftpTraderHost: placeholder-tbc
  sftpTraderPort: 22
  sftpTraderUsername: placeholder-tbc
  sfiInboundDirectory: /opt/cap_prod_data/DAX/out/Int_725
  sfiPilotInboundDirectory: /opt/cap_prod_data/DAX/out/Int_725
  lumpSumsInboundDirectory: /opt/cap_prod_data/DAX/out/Int_725
  csInboundDirectory: /opt/cap_prod_data/DAX/out/int_716
  bpsInboundDirectory: /opt/cap_prod_data/DAX/out/int_539
  esInboundDirectory: /opt/cap_prod_data/genesis/in/int_073
  esOutboundDirectory: /opt/cap_prod_data/genesis/out/int_072
  fcInboundDirectory: /opt/cap_prod_data/glos/in/int_230
  fcOutboundDirectory: /opt/cap_prod_data/glos/out/int_231
  impsInboundDirectory: D:\app\DAX_interface\CFI\outbound
  impsOutboundDirectory: D:\app\DAX_interface\CFI\inbound
  sfi23InboundDirectory: /opt/cap_prod_data/DAX/out/Int_725
  dpsInboundDirectory: D:\app\DAX_interface\DPS\outbound
  dpsOutboundDirectory: D:\app\DAX_interface\DPS\inbound
  delinkedInboundDirectory: /opt/cap_prod_data/DAX/out/Int_725
  combinedOfferInboundDirectory: /opt/cap_prod_data/DAX/out/Int_725
  cohtCapitalInboundDirectory: /opt/cap_prod_data/DAX/out/Int_725
  impsPollWindowStart: "00:00"
  impsPollWindowEnd: "23:59"
  impsPollDays: "Sun,Mon,Tue,Wed,Thu,Fri,Sat"
  dpsPollWindowStart: "00:00"
  dpsPollWindowEnd: "23:59"
  dpsPollDays: "Sun,Mon,Tue,Wed,Thu,Fri,Sat"
secretProviderClass:
  azure:
    keyvaultName: PRDFFCINFKV1001
    objects: # reading the secret from Azure Key Vault
      - objectName: prd-ffcahwr-appinsights-connectionString
        objectType: secret
      - objectName: ffc-pay-callisto-password
        objectType: secret
      - objectName: ffc-pay-managed-gateway-private-key
        objectType: secret

  secretObjects: # creating a kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-gateway
      type: Opaque
      data:
        - objectName: prd-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: ffc-pay-callisto-password
          key: SFTP_TRADER_PASSWORD
        - objectName: ffc-pay-managed-gateway-private-key
          key: SFTP_MANAGED_GATEWAY_PRIVATE_KEY