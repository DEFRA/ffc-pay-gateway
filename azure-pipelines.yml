# Pipeline name convention
name: '$(Build.SourceBranchName)$(System.PullRequest.SourceBranch)$(Rev:.r)'

# Trigger configuration
trigger:
  - main
  - feature/*
  - release/*

pr:
  - main
  - releases/*

# Parameters
parameters:
  - name: prDeployment
    type: boolean
    default: true
  - name: branchDeployment
    type: boolean
    default: true
  - name: sndDeployment
    type: boolean
    default: true

# Resources
resources:
  repositories:
    - repository: templates
      endpoint: DEFRA
      type: github
      name: defra/fcp-pipeline-common
      # ref: pl-709   # Optional: build specific pipeline branch

# Pipeline template
extends:
  template: fcp-common-pipeline.yaml@templates
  parameters:
    appFrameworkType: nodejs   # Optional: nodejs (default), dotnet, java
    Type: kubernetes           # Optional: kubernetes (default), npm, functions, nuget
    npmLegacyPeerDeps: false   # Optional: default is false
    dockerFilePath: Dockerfile # Optional default is Dockerfile
    failOnThreshold: moderate  # Optional: moderate (default), low, high, critical
    prDeployment: ${{ parameters.prDeployment }}
    branchDeployment: ${{ parameters.branchDeployment }}
    sndDeployment: ${{ parameters.sndDeployment }}
    variableGroupName: ffc-pay-gateway-env-var
    pr_params:
      container.sftpManagedGatewayEnabled: $(pr_sftpManagedGatewayEnabled)
      container.sftpTraderEnabled: $(pr_sftpTraderEnabled)
      container.sfiEnabled: $(pr_sfiEnabled)
      container.sfiPilotEnabled: $(pr_sfiPilotEnabled)
      container.lumpSumsEnabled: $(pr_lumpSumsEnabled)
      container.csEnabled: $(pr_csEnabled)
      container.bpsEnabled: $(pr_bpsEnabled)
      container.esEnabled: $(pr_esEnabled)
      container.fcEnabled: $(pr_fcEnabled)
      container.impsEnabled: $(pr_impsEnabled)
      container.sfi23Enabled: $(pr_sfi23Enabled)
      container.dpsEnabled: $(pr_dpsEnabled)
      container.delinkedEnabled: $(pr_delinkedEnabled)
      container.combinedOfferEnabled: $(pr_combinedOfferEnabled)
      container.cohtCapitalEnabled: $(pr_cohtCapitalEnabled)
      container.sftpManagedGatewayHost: $(pr_sftpManagedGatewayHost)
      container.sftpManagedGatewayUsername: $(pr_sftpManagedGatewayUsername)
      container.sftpTraderHost: $(pr_sftpTraderHost)
      container.sftpTraderUsername: $(pr_sftpTraderUsername)
    snd2_params:
      container.sftpManagedGatewayEnabled: $(snd2_sftpManagedGatewayEnabled)
      container.sftpTraderEnabled: $(snd2_sftpTraderEnabled)
      container.sfiEnabled: $(snd2_sfiEnabled)
      container.sfiPilotEnabled: $(snd2_sfiPilotEnabled)
      container.lumpSumsEnabled: $(snd2_lumpSumsEnabled)
      container.csEnabled: $(snd2_csEnabled)
      container.bpsEnabled: $(snd2_bpsEnabled)
      container.esEnabled: $(snd2_esEnabled)
