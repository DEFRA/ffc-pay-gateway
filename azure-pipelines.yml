      combinedOfferEnabled: $(snd2_combinedOfferEnabled)
      cohtCapitalEnabled: $(snd2_cohtCapitalEnabled)
      sftpManagedGatewayHost: $(snd2_sftpManagedGatewayHost)
      sftpManagedGatewayUsername: $(snd2_sftpManagedGatewayUsername)
      sftpTraderHost: $(snd2_sftpTraderHost)
      sftpTraderUsername: $(snd2_sftpTraderUsername)
    dev_params:
