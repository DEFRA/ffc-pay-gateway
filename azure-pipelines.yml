      container.sftpManagedGatewayHost: $(snd2_sftpManagedGatewayHost)
      container.sftpManagedGatewayUsername: $(snd2_sftpManagedGatewayUsername)
      container.sftpTraderHost: $(snd2_sftpTraderHost)
      container.sftpTraderUsername: $(snd2_sftpTraderUsername)
    dev_params:
      container.sftpManagedGatewayEnabled: $(dev_sftpManagedGatewayEnabled)
