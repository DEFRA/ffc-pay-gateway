# Pipeline name convention
name: '$(Build.SourceBranchName)$(System.PullRequest.SourceBranch)$(Rev:.r)'

# Trigger configuration
trigger:
  - main
  - feature/*
  - release/*

pr:
  - main
  - releases/*

# Parameters
parameters:
  - name: prDeployment
    type: boolean
    default: true
  - name: branchDeployment
    type: boolean
    default: true
  - name: sndDeployment
    type: boolean
    default: true

# Resources
resources:
  repositories:
    - repository: templates
      endpoint: DEFRA
      type: github
      name: defra/fcp-pipeline-common
      # ref: pl-709   # Optional: build specific pipeline branch

# Pipeline template
extends:
  template: fcp-common-pipeline.yaml@templates
  parameters:
    appFrameworkType: nodejs   # Optional: nodejs (default), dotnet, java
    Type: kubernetes           # Optional: kubernetes (default), npm, functions, nuget
    npmLegacyPeerDeps: false   # Optional: default is false
    dockerFilePath: Dockerfile # Optional default is Dockerfile
    prDeployment: ${{ parameters.prDeployment }}
    branchDeployment: ${{ parameters.branchDeployment }}
    sndDeployment: ${{ parameters.sndDeployment }}
    # failOnThreshold: moderate
    variableGroupName: ffc-pay-gateway-env-var
    pr_params:
      sftpManagedGatewayEnabled: ${{ eq(variables['pr_sftpManagedGatewayEnabled'], 'true') }}
      sftpTraderEnabled: ${{ eq(variables['pr_sftpTraderEnabled'], 'true') }}
      sfiEnabled: ${{ eq(variables['pr_sfiEnabled'], 'true') }}
      sfiPilotEnabled: ${{ eq(variables['pr_sfiPilotEnabled'], 'true') }}
      lumpSumsEnabled: ${{ eq(variables['pr_lumpSumsEnabled'], 'true') }}
      csEnabled: ${{ eq(variables['pr_csEnabled'], 'true') }}
      bpsEnabled: ${{ eq(variables['pr_bpsEnabled'], 'true') }}
      esEnabled: ${{ eq(variables['pr_esEnabled'], 'true') }}
      fcEnabled: ${{ eq(variables['pr_fcEnabled'], 'true') }}
      impsEnabled: ${{ eq(variables['pr_impsEnabled'], 'true') }}
      sfi23Enabled: ${{ eq(variables['pr_sfi23Enabled'], 'true') }}
      dpsEnabled: ${{ eq(variables['pr_dpsEnabled'], 'true') }}
      delinkedEnabled: ${{ eq(variables['pr_delinkedEnabled'], 'true') }}
      combinedOfferEnabled: ${{ eq(variables['pr_combinedOfferEnabled'], 'true') }}
      cohtCapitalEnabled: ${{ eq(variables['pr_cohtCapitalEnabled'], 'true') }}
      sftpManagedGatewayHost: $(pr_sftpManagedGatewayHost)
      sftpManagedGatewayUsername: $(pr_sftpManagedGatewayUsername)
      sftpTraderHost: $(pr_sftpTraderHost)
      sftpTraderUsername: $(pr_sftpTraderUsername)
