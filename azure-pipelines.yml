# Pipeline name convention
name: '$(Build.SourceBranchName)$(System.PullRequest.SourceBranch)$(Rev:.r)'

# Trigger configuration
trigger:
  - main
  - feature/*
  - release/*

pr:
  - main
  - releases/*

# Parameters
parameters:
  - name: prDeployment
    type: boolean
    default: true
  - name: branchDeployment
    type: boolean
    default: true
  - name: sndDeployment
    type: boolean
    default: true

# Resources
resources:
  repositories:
    - repository: templates
      endpoint: DEFRA
      type: github
      name: defra/fcp-pipeline-common
      # ref: pl-709   # Optional: build with a specific pipeline version

# Pipeline template
extends:
  template: fcp-common-pipeline.yaml@templates
  parameters:
    appFrameworkType: nodejs   # Optional: nodejs (default), dotnet, java
    Type: kubernetes           # Optional: kubernetes (default), npm, functions, nuget
    npmLegacyPeerDeps: false   # Optional: default is false
    dockerFilePath: Dockerfile # Optional default is Dockerfile
    prDeployment: ${{ parameters.prDeployment }}
    branchDeployment: ${{ parameters.branchDeployment }}
    sndDeployment: ${{ parameters.sndDeployment }}
    # failOnThreshold: moderate
    variableGroupName: ffc-pay-gateway-env-var
    pr_params:
      sftpManagedGatewayEnabled: $(pr_sftpManagedGatewayEnabled)
      sftpTraderEnabled: $(pr_sftpTraderEnabled)
      sfiEnabled: $(pr_sfiEnabled)
      sfiPilotEnabled: $(pr_sfiPilotEnabled)
      lumpSumsEnabled: $(pr_lumpSumsEnabled)
      csEnabled: $(pr_csEnabled)
      bpsEnabled: $(pr_bpsEnabled)
      esEnabled: $(pr_esEnabled)
      fcEnabled: $(pr_fcEnabled)
      impsEnabled: $(pr_impsEnabled)
      sfi23Enabled: $(pr_sfi23Enabled)
      dpsEnabled: $(pr_dpsEnabled)
      delinkedEnabled: $(pr_delinkedEnabled)
      combinedOfferEnabled: $(pr_combinedOfferEnabled)
      cohtCapitalEnabled: $(pr_cohtCapitalEnabled)
      sftpManagedGatewayHost: $(pr_sftpManagedGatewayHost)
      sftpManagedGatewayUsername: $(pr_sftpManagedGatewayUsername)
      sftpTraderHost: $(pr_sftpTraderHost)
      sftpTraderUsername: $(pr_sftpTraderUsername)
    snd2_params:
      sftpManagedGatewayEnabled: $(snd2_sftpManagedGatewayEnabled)
      sftpTraderEnabled: $(snd2_sftpTraderEnabled)
